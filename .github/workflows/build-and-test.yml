name: Build and Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  client:
    name: Build Client
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: battleship-client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: battleship-client/package-lock.json
      - run: npm ci
      - run: npm run build

  server:
    name: Build and Test Server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BattleshipServer
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - run: dotnet build --configuration Release
      - run: dotnet test --configuration Release --no-build
