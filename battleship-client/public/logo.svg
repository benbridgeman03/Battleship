<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Hull - pointed bow facing up -->
  <path d="M32 58 L14 42 L12 30 L16 28 L48 28 L52 30 L50 42 Z" fill="#3a3a4a" stroke="#1a1a2e" stroke-width="1.5" stroke-linejoin="round"/>
  
  <!-- Deck / superstructure base -->
  <rect x="20" y="24" width="24" height="6" rx="1" fill="#555568" stroke="#1a1a2e" stroke-width="1"/>
  
  <!-- Bridge / main tower -->
  <rect x="26" y="14" width="12" height="12" rx="1" fill="#6a6a7e" stroke="#1a1a2e" stroke-width="1"/>
  
  <!-- Bridge windows -->
  <rect x="28.5" y="16.5" width="3" height="2" rx="0.5" fill="#a8d8ff" opacity="0.9"/>
  <rect x="32.5" y="16.5" width="3" height="2" rx="0.5" fill="#a8d8ff" opacity="0.9"/>
  
  <!-- Mast / antenna -->
  <line x1="32" y1="14" x2="32" y2="6" stroke="#1a1a2e" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="32" cy="5.5" r="1.5" fill="#cc3333"/>
  
  <!-- Radar crossbar -->
  <line x1="28" y1="9" x2="36" y2="9" stroke="#1a1a2e" stroke-width="1.2" stroke-linecap="round"/>
  
  <!-- Side gun turrets -->
  <circle cx="18" cy="32" r="3" fill="#4a4a5e" stroke="#1a1a2e" stroke-width="1"/>
  <line x1="18" y1="32" x2="18" y2="27" stroke="#1a1a2e" stroke-width="1.5" stroke-linecap="round"/>
  
  <circle cx="46" cy="32" r="3" fill="#4a4a5e" stroke="#1a1a2e" stroke-width="1"/>
  <line x1="46" y1="32" x2="46" y2="27" stroke="#1a1a2e" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Front main gun -->
  <circle cx="32" cy="38" r="3.5" fill="#4a4a5e" stroke="#1a1a2e" stroke-width="1"/>
  <rect x="30.5" y="38" width="3" height="10" rx="1" fill="#3a3a4a" stroke="#1a1a2e" stroke-width="0.8"/>
</svg>